name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      # `uv sync` above is non-frozen, so it silently tolerates a stale lock. The
      # release workflow runs `uv lock --check` + `uv sync --frozen` and hard-fails,
      # so without this step a forgotten `uv.lock` bump first surfaces at release.
      - name: Verify lockfile is current
        run: uv lock --check
      - name: Lint
        run: |
          uv run black --check src tests
          uv run ruff check src tests
      - name: Schema drift guard
        run: |
          uv run python -m sleap_roots_contracts.schema
          git diff --exit-code schema/
      - name: Test
        run: uv run pytest --cov=src/sleap_roots_contracts --cov-report=term-missing -v
