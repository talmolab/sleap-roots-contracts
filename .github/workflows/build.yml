# Package build and publish workflow.
#
# Mirrors sleap-roots-analyze's build.yml: a validate-release gate runs before
# any publish, so a release can never ship with a mismatched tag/version, a
# missing changelog entry, failing lint/tests, or a stale schema artifact.
name: Build

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Verify lockfile is current
        # uv sync --frozen hard-fails on a stale lock; check explicitly first so
        # a lock/pyproject mismatch surfaces as a clear error, not a cryptic sync
        # failure at release time.
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(uv version | awk '{print $NF}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Validate tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' from tag (v0.1.0a2 -> 0.1.0a2)
          TAG_VERSION="${TAG#v}"
          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches pyproject.toml version $VERSION"

      - name: Validate changelog entry exists
        if: github.event_name == 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "\[$VERSION\]" docs/CHANGELOG.md; then
            echo "ERROR: No changelog entry found for version $VERSION in docs/CHANGELOG.md"
            exit 1
          fi
          echo "Changelog entry found for version $VERSION"

      - name: Lint
        run: |
          uv run black --check src tests
          uv run ruff check src tests

      - name: Schema drift guard
        # The emitted JSON Schema is generated from the Pydantic models and each
        # schema's $id embeds the package version. Regenerate and fail if the
        # committed artifact differs — a release must never publish a stale or
        # version-mismatched schema (the byte Bloom keys on).
        run: |
          uv run python -m sleap_roots_contracts.schema
          git diff --exit-code schema/

      - name: Run tests
        run: uv run pytest -m "not integration" tests/ -x -q

  build-and-publish:
    name: Build and Publish
    needs: validate-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # Required for actions/checkout
      id-token: write # Required for PyPI trusted publishing (OIDC)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Verify wheel installs and reports the released version
        run: |
          uv run --isolated --with dist/*.whl \
            python -c "import sleap_roots_contracts as s; print(f'Version: {s.__version__}')"

      - name: Publish to PyPI
        if: github.event_name == 'release'
        run: uv publish
